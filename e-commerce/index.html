<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }

    #headerMainDiv {
        display: flex;
        justify-content: center;
        background-color: black;
        padding: 2vw;
        justify-content: space-around;
    }

    #CartBtn {
        width: 3vw;
        height: auto;
        cursor: pointer;
    }

    #MainLogo {
        width: 3vw;
        height: auto;
        cursor: pointer;
    }

    #searchInput {
        width: 45vw;
        padding: 10px;

    }

    .Plogin {
        color: #fff;
        cursor: pointer;
    }

    video {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    #VideoDiv {
        display: flex;
        justify-content: center 
    }
</style>

<body>
    <header>
        <div>
            <div id="headerMainDiv">
                <div>
                    <img id="MainLogo" src="https://cdn-icons-png.freepik.com/512/5278/5278590.png">
                </div>
                <div>
                    <input id="searchInput" placeholder="Search" type="text">
                </div>
                <div>
                    <p class="Plogin">Login/SingUP</p>
                    <p class="Plogin">MY Account</p>
                </div>
                <div>
                    <img id="CartBtn"
                        src="https://icon-library.com/images/white-shopping-cart-icon/white-shopping-cart-icon-2.jpg">
                </div>
            </div>
        </div>
    </header>
    <section>
        <div id="VideoDiv">
            <video src="https://kinvid1.bluestone.com/output/mp4/VL_VIDEO_1.mp4/VL_VIDEO_1.mp4" autoplay loop
                muted></video>
        </div>
    </section>
</body>
</html>
