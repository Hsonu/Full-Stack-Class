<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    #headerMainDiv {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background-color: black;
        padding: 2vw;
    }

    #MainLogo,
    #CartBtn {
        width: 3vw;
        cursor: pointer;
    }

    #searchInput {
        width: 45vw;
        padding: 10px;
    }

    .Plogin {
        color: #fff;
        cursor: pointer;
    }

    #imgPhoto {
        width: 100%;
        max-width: 40vw;
        height: 30vw;
        object-fit: cover;
        display: block;
        margin-left: 40px;
        background-color: #fff;
        /* border: 1px solid black;
            border-radius: 10px; */
    }

    #cardMainDiv {
        display: flex;
        background-color: #F0F0F0;
        /* padding: 10px; */
        height: 70vh;
    }
    #product-name-p{
        font-size: 100px;
    }
</style>

<body>
    <header>
        <div id="headerMainDiv">

            <div>
                <img id="MainLogo" src="https://cdn-icons-png.freepik.com/512/5278/5278590.png">
            </div>

            <div>
                <input id="searchInput" placeholder="Search" type="text">
            </div>

            <div>
                <p class="Plogin">Login/Sign up</p>
                <p class="Plogin">My Account</p>
            </div>

            <div>
                <img id="CartBtn"
                    src="https://icon-library.com/images/white-shopping-cart-icon/white-shopping-cart-icon-2.jpg">
            </div>

        </div>
    </header>
</body>
<section>
    <div id="cardMainDiv">
        <div>
            <img id="imgPhoto"
                src="https://kinclimg2.bluestone.com/f_webp,c_scale,w_1024,b_rgb:f0f0f0/giproduct/BINS0799R11_YAA18DIG6SOG60015_ABCD00-PICS-00001-1024-66182.png">
        </div>
        <div>
            <p id="product-name-p">The Nomi Bridal Ring Set</p>
        </div>
    </div>
</section>
</html>
