<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    #mainTop {
        background-color: black;
        color: aliceblue;
    }

    .Instagram {
        height: 2vw;
        width: auto;
        padding: 1vh;
    }

    #MenuButton,
    #icon {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        width: 15vw;
        height: 2vh;
    }

    .HeartIcon,
    .CartIcon,
    .AccountIcon {
        display: flex;
        height: 4.5vh;
        width: auto;
        justify-content: space-between;
        flex-wrap: wrap;
        cursor: pointer;
    }

    .MenuButton {
        height: 4.5vh;
        width: auto;
        display: none;
        justify-content: flex-end;
        align-items: center;
        text-align: center;
    }

    .MenuButton {
        display: flex;
        cursor: pointer;
    }

    .MenuButton {
        height: 4.5vh;
        width: auto;
        display: none;
        justify-content: flex-end;
        align-items: center;
        text-align: center;
    }

    #f-n {
        display: flex;
        list-style: none;
        gap: 10px;
        font-size: 3.5vh;
        font-weight: bold;
        flex-wrap: wrap;
    }

    input {
        color: black;
        width: 38vw;
        height: 4.2vh;
        padding: 1vh;
        border: 1px solid rgb(236, 227, 227);
        background-color: rgba(233, 233, 233, 0.5);
    }

    li {
        display: flex;
        flex-wrap: wrap;
        cursor: pointer;
    }

    header {
        position: fixed;
        width: 100%;
        border: 1px solid rgb(44, 134, 105);
        box-shadow: 0.1px 0.1px 2px;
        z-index: 9;
    }

    nav {
        display: flex;
        justify-content: center;
        align-items: center;
        border-top: 1px solid rgba(233, 233, 233, 0.5);
    }

    img {
        width: 20vw;
    }

    :root {
        --nav-height: 80px;
        --tw-gradient-to-position: ;
    }

    #heading {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }

    li:hover {
        color: rgb(5, 250, 5);
        border-bottom: 2px solid rgb(0, 0, 0);

    }

    @keyframes allpohto {
        0% {
            transform: translateX(0);
        }

        50% {
            transform: translateX(-50%);
        }

        100% {
            transform: translateX(0);
        }
    }

    @media only screen and (max-width: 768px) {
        #f-n {
            display: none;
            z-index: 9;
        }

        #f-n.menu1 {
            display: flex;
        }

        .MenuButton {
            display: flex;
            cursor: pointer;
        }

        .menu1 {
            display: flex;
            justify-content: center;
            align-content: center;
            flex-direction: column;
        }

        li:hover {
            color: rgb(5, 250, 5);
            border-bottom: 2px solid rgb(0, 0, 0);
        }

    }
</style>

<body>
    <header>
        <div id="mainTop">
            <img class="Instagram" src="/icon/Instagram.png">
        </div>
        <div>
            <div id="heading">
                <a href="../index.html"> <img
                        src="https://thenaturalgreens.com/wp-content/uploads/2025/07/The-Natural-Greens-logo.png#2644"></a>
                <input placeholder="Search" type="text">

                <div id="icon">
                    <img class="HeartIcon" src="../icon/HeartIcon.png">
                    <img class="CartIcon" src="https://img.icons8.com/?size=100&id=82712&format=png&color=000000">
                    <a href="../login-page.html"> <img class="AccountIcon" src="../icon/AccountIcon.png"></a>
                </div>
                <div class="icon">
                    <img class="MenuButton" src="../icon/Manu.png">
                </div>
                <div>
                </div>
            </div>
            <nav>
                <ul id="f-n">
                    <li class="active">Home</li>
                    <li>Plants↓</li>
                    <li>Pots↓</li>
                    <li>Combos</li>
                    <li>Collections</li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
