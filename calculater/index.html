<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .text {
        border: none;
        text-align: right;
        /* font-size: 3vw; */
    }

    body {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #0a0a0a, #3a4455);
    }

    #DIV {
        border: 1px solid #717377;
        box-shadow: 0px 3px 15px rgba(113, 115, 119, 0.5);
        padding: 20px;
        border-radius: 16px;
        background: transparent;
    }

    input {
        width: 320px;
        padding: 24px;
        border: none;
        background: transparent;
        box-shadow: 0px 3px 15px rgbs(84, 84, 84 0.1);
        font-size: 40px;
        cursor: pointer;
        color: #ffffff;
    }

    input::placeholder {
        color: #ffffff;

    }

    button {
        border: none;
        width: 60px;
        height: 60px;
        margin: 10px;
        border-radius: 50%;
        background-color: transparent;
        color: #ffffff;
        font-size: 20px;
        box-shadow: -8px -8px 15px rgba(225, 255, 255, .1);
        cursor: pointer;
    }

    .back {
        background-color: #fb7c14;
    }

    .operator {
        color: #6dee01;
    }
</style>

<body>
    <div ID="DIV">
        <input class="text"  readonly type="input" placeholder="0">
        <div>
            <button class="operator" onclick="allclear()">AC</button>
            <button class="operator" onclick="Del()">DEL</button>
            <button class="operator" onclick="percent('%')">%</button>
            <button class="operator" onclick="press('/')">/</button>
        </div>
        <DIV>
            <button class="num" onclick="press('7')">7</button>
            <button class="num" onclick="press('8')">8</button>
            <button class="num" onclick="press('9')">9</button>
            <button class="operator" onclick="press('*')">*</button>
        </DIV>
        <DIV>
            <button class="num" onclick="press('4')">4</button>
            <button class="num" onclick="press('5')">5</button>
            <button class="num" onclick="press('6')">6</button>
            <button class="operator" onclick="press('-')">-</button>
        </DIV>
        <DIV>
            <button class="num" onclick="press('1')">1</button>
            <button class="num" onclick="press('2')">2</button>
            <button class="num" onclick="press('3')">3</button>
            <button class="operator" onclick="press('+')">+</button>
        </DIV>
        <DIVE>
            <BUtton class="num" onclick="press('00')">00</BUtton>
            <BUtton class="num" onclick="press('0')">0</BUtton>
            <BUtton class="num" onclick="press('.')">.</BUtton>
            <BUtton class="back" onclick="calculater()">=</BUtton>
        </DIVE>
    </div>
    <script>
        let display = document.querySelector('.text');

        function press(value){
            display.value += value;
        }

        function calculater (){
            display.value = eval(display.value);
        }
        function allclear(){
            display.value = ""
        }
        function Del(value1) {
            display.value -= value1;
        }
        function percent (value) {
            display.value = display.value / 100;
        }


    </script>


</body>
</html>
