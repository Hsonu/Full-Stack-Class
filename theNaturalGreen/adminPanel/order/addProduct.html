<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        /* Layout */
        #main {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            height: 100vh;
            background: #222d32;
            color: white;
        }

        #sidebar h2 {
            padding: 15px;
            background: #1a2226;
        }

        #sidebar ul {
            list-style: none;
        }

        #sidebar ul li {
            padding: 12px 15px;
            border-bottom: 1px solid #2c3b41;
            cursor: pointer;
        }

        #sidebar ul li:hover {
            background: #1e282c;
        }

        /* Content Area */
        #div1 {
            padding: 20px;
        }

        /* Form Layout */
        .box1 {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .box1 p {
            width: 120px;
        }

        .box1 input {
            padding: 5px;
            flex: 1;
        }

        /* Button */
        button {
            margin-top: 10px;
            padding: 8px 15px;
            background: #00a65a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #008d4c;
        }

        /* Links */
        #Dashboard,
        #orderText {
            text-decoration: none;
            color: #fff;
        }

        input {
            border-radius: 5px;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
            <h2>Admin Panel</h2>
            <ul>
                <a id="Dashboard" href="../Dashboard.html">
                    <li>Dashboard</li>
                </a>
                <a id="orderText" href="./Order.html">
                    <li>Product</li>
                </a>
                <li>Status</li>
            </ul>
        </div>
        <div id="div1">
            <div class="box1">
                <p> Product Name</p>
                <input placeholder="Product Name" type="text">
            </div>
            <div class="box1">
                <p>Category</p>
                <input placeholder="Category" type="text">
            </div>
            <div class="box1">
                <p>Units</p>
                <input placeholder="Units"  type="number">
            </div>
            <div class="box1">
                <p>Rate</p>
                <input placeholder="Rate" type="number">
            </div>
            <div class="box1">
                <p>Total</p>
                <input placeholder="Total" readonly type="text">
            </div>
            <div class="box1">
                <p>Description</p>
                <input placeholder="Description" type="text">
            </div>
             <div class="box1">
                <p>Image</p>
                <input placeholder="Description" type="file">
            </div>
            <button>Save</button>
        </div>
    </div>
</body>

</html>
