<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #main {
            display: flex;
            justify-content: center;
            height: auto;
            flex-direction: column;
            align-items: center;
        }

        #f-img {
            display: flex;
            height: auto;
            width: 20vw;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 10px 10px;
            box-shadow: 0px 0px 4px 0px white;
        }

        #f-img:hover {
            box-shadow: 0px 0px 4px 1px white;
            cursor: pointer;
        }

        img {
            display: flex;
            height: auto;
            width: 20vw;
        }

        #main1 {
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            width: 20vw;
            align-items: center;
            justify-content: center;
            padding: 2vw;
            background-color: black;
            border-radius: 10px;
            padding-top: 0.5vw;
        }

        #nd-img {
            height: 50px;
            width: auto;
        }

        #control {
            display: flex;
            gap: 4vw;
            margin-top: 2vw;
        }

        .control-img-f,
        .control-img {
            width: 2vw;
            height: 2vw;
            display: flex;
            justify-content: center;
            cursor: pointer;
            background-color: aliceblue;
            border-radius: 9px;
            padding: 0.5vw;
            box-shadow: 10px 10px;
        }

        .control-img:hover {
            background-color: #00c243;
            box-shadow: 0px 0px 7px 0px white
        }

        .control-img-f:hover {
            background-color: #00c243;
            box-shadow: 0px 0px 7px 0px white
        }


        .control-img-f {
            width: 2.8vw;
            height: 2.8vw;
        }

        .f-img-div {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player {
            display: flex;
            margin-top: 2vw;
            height: 10px;
            width: 20vw;
            color: black;
        }

        #song-p {
            color: aliceblue;
        }

        #sonu-p-div {
            display: flex;
            justify-content: center;
            font-size: 1.5vw;
        }
    </style>
</head>

<body>
    <div id="main">
        <div id="main1">
            <div>
                <div id="sonu-p-div">
                    <p id="song-p">Salaar Cease Fire - Hindi (Original Motion Picture Soundtrack)</p>
                </div>
                <img id="f-img"
                    src="https://c.saavncdn.com/679/Salaar-Cease-Fire-Hindi-Hindi-2024-20260205193338-500x500.jpg">
                <audio id="song">
                    <source src="salaar.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div>
                <div>
                    <input id="progress" type="range" max="100" value="1" class="player">
                </div>
            </div>
            <div id="control">
                <div class="f-img-div">
                    <img class="control-img" src="./image1.png">
                </div class="f-img-div">
                <div>
                    <img class="control-img-f" id="playBtn" src="./image2.png">
                </div>
                <div class="f-img-div">
                    <img class="control-img" src="./image3.png">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
