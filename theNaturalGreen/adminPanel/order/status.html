<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        /* Layout */
        #main {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            height: 100vh;
            background: #222d32;
            color: white;
        }

        #sidebar h2 {
            padding: 15px;
            background: #1a2226;
        }

        #sidebar ul {
            list-style: none;
        }

        #sidebar ul li {
            padding: 12px 15px;
            border-bottom: 1px solid #2c3b41;
            cursor: pointer;
        }

        #sidebar ul li:hover {
            background: #1e282c;
        }

        /* Links */
        #sidebar a {
            text-decoration: none;
            color: white;
        }

        /* Content */
        section {
            flex: 1;
            padding: 20px;
        }

        .statusProduct {
            display: flex;
            justify-content: center;
            /* gap: 6vw; */
        }

        .statusp {
            border: 1px solid #ccc;
            padding: 1vw;
            background: #f9f9f9;
            font-weight: bold;
            width: 10vw;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
            <h2>Admin Panel</h2>
            <ul>
                <a href="../Dashboard.html">
                    <li>Dashboard</li>
                </a>
                <a href="./Order.html">
                    <li>Product</li>
                </a>
                <li>Status</li>
            </ul>
        </div>

        <!-- Content -->
        <section>
            <div class="statusProduct">
                <p class="statusp">Product Name</p>
                <p class="statusp">Units</p>
                <p class="statusp">Rate</p>
                <p class="statusp">Amount</p>
                <p class="statusp">Status</p>
                <p class="statusp">Address</p>
                <p class="statusp">Order Date</p>
            </div>
            <div class="statusProduct">
                <p class="statusp">Ring</p>
                <p class="statusp">Units</p>
                <p class="statusp">Rate</p>
                <p class="statusp">Amount</p>
                <p class="statusp">Status</p>
                <p class="statusp">Address</p>
                <p class="statusp">Order Date</p>
            </div>
        </section>
    </div>
</body>

</html>
