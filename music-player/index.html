<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #main {
            display: flex;
            justify-content: center;
            height: auto;
            flex-direction: column;
            align-items: center;
        }

        #f-img {
            display: flex;
            height: auto;
            width: 20vw;
            border: 1px solid black;
            border-radius: 50%;
            box-shadow: 0px 0px 4px 0px white;
        }

        @keyframes spin {
            0% {
                transform: rotate(-360deg);
            }
        }

        @keyframes spin1 {
            0% {
                transform: rotate(360deg);
            }
        }




        #f-img:hover {
            box-shadow: 0px 0px 4px 1px white;
            cursor: pointer;
        }

        img {
            display: flex;
            height: auto;
            width: 20vw;
        }

        #main1 {
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            width: 20vw;
            align-items: center;
            justify-content: center;
            padding: 2vw;
            /* background-color: black; */
            /* background-color: #29739aa3; */
            background: linear-gradient(to bottom, #2BB3F3, #0033A0);
            border-radius: 10px;
            padding-top: 0.5vw;
        }

        #nd-img {
            height: 50px;
            width: auto;
        }

        #control {
            display: flex;
            gap: 4vw;
            margin-top: 2vw;
        }

        .control-img-f,
        .control-img {
            width: 1.4vw;
            height: 1.4vw;
            display: flex;
            justify-content: center;
            cursor: pointer;
            background-color: aliceblue;
            border-radius: 9px;
            padding: 0.5vw;
        }

        .control-img:hover {
            /* background-color: #00c243; */
            background: linear-gradient(to bottom, #2BB3F3, #0033A0);
            box-shadow: 0px 0px 7px 0px white;
        }

        .control-img-f:hover {
            /* background-color: #00c243; */
            background: linear-gradient(to bottom, #2BB3F3, #0033A0);
            box-shadow: 0px 0px 7px 0px white;
        }


        .control-img-f {
            width: 1.5vw;
            height: 1.5vw;
            padding: 1vw;
        }

        .f-img-div {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player {
            --webkit-appearance: none;
            display: flex;
            margin-top: 2vw;
            height: 3px;
            width: 20vw;
            color: black;
            cursor: pointer;
            background: #ffffff2c;
        }

        #song-p {
            color: aliceblue;
        }

        #sonu-p-div {
            display: flex;
            justify-content: center;
            font-size: 1.5vw;
        }

        #center-img {
            position: absolute;
            margin-top: 6.5vw;
            height: auto;
            width: 11vw;
            z-index: 999;
        }

        #center-img-div {
            height: auto;
            width: 20vw;
            display: flex;
            justify-content: center;
        }

        #playBtn1 {
            /* position: absolute;
            z-index: 999; */
            display: none;
        }

        @media(max-width: 500px) {
            #main {
                display: flex;
                justify-content: center;
                height: auto;
                flex-direction: column;
                align-items: center;
            }

            #main1 {
                border: 1px solid black;
                display: flex;
                flex-direction: column;
                width: 60vw;
                align-items: center;
                /* justify-content: center; */
                padding: 2vw;
                /* background-color: black; */
                /* background-color: #29739aa3; */
                background: linear-gradient(to bottom, #2BB3F3, #0033A0);
                border-radius: 10px;
                padding-top: 0.5vw;
            }

            #sonu-p-div {
                display: flex;
                justify-content: center;
                font-size: 6.5vw;
            }

            #f-img {
                display: flex;
                height: auto;
                width: 74vw;
                border: 1px solid black;
                border-radius: 10px;
                box-shadow: 0px 0px 4px 0px white;
            }

            #f-img:hover {
                box-shadow: 0px 0px 4px 1px white;
                cursor: pointer;
            }

            /* .player {
                --webkit-appearance: none;
                display: flex;
                margin-top: 2vw;
                height: 4px;
                width: 57vw;
                color: black;
                cursor: pointer;
                background: #ffffff2c;

            } */

            #control {
                display: flex;
                gap: 14vw;
                margin-top: 3vh;
            }

            .f-img-div {
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .control-img-f,
            .control-img {
                width: auto;
                height: 5.4vw;
                display: flex;
                justify-content: center;
                cursor: pointer;
                background-color: aliceblue;
                border-radius: 9px;
                padding: 1.5vw;

            }

            .control-img:hover {
                background-color: #00c243;
                box-shadow: 0px 0px 7px 0px white;
            }

            .control-img-f {
                width: auto;
                height: 6.5vw;
                padding: 3vw;
            }

            .player {
                --webkit-appearance: none;
                display: flex;
                margin-top: 2vw;
                height: 2px;
                width: 40vw;
                color: black;
                cursor: pointer;
                background: #ffffff2c;
            }

            #f-img {
                display: flex;
                height: auto;
                width: 50vw;
                border: 1px solid black;
                border-radius: 50%;
                box-shadow: 0px 0px 4px 0px white;
            }

            #song-p {
                color: aliceblue;
                /* font-size: 2vw; */
                font-size: 4vw;
                margin-top: 3vh;

            }

            #center-img {
                position: absolute;
                margin-top: 17.5vw;
                height: auto;
                width: 26vw;
                z-index: 999;
                margin-left: 30vw;
            }

        }
    </style>
</head>

<body>
    <div id="main">
        <div id="main1">
            <div>

                <div id="center-img-div">
                    <img id="center-img" src="./dvd img.png">
                </div>
                <img id="f-img"
                    src="https://c.saavncdn.com/679/Salaar-Cease-Fire-Hindi-Hindi-2024-20260205193338-500x500.jpg">
            </div>
            <div id="sonu-p-div">
                <p id="song-p">Salaar Cease Fire - Hindi (Original Motion Picture Soundtrack)</p>
            </div>
            <div>
                <div>
                    <input id="progress" type="range" max="100" value="1" class="player">
                </div>
            </div>
            <div id="control">
                <div class="f-img-div">
                    <img class="control-img" src="./image1.png">
                    <audio id="song">
                        <source src="./Sooraj Hi Chhaon Banke Salaar 128 Kbps.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <div class="f-img-div">
                    <img class="control-img-f" id="playBtn" onclick="rotateCircle()" ondblclick="stopCircle()"
                        src="./image2.png">
                    <img class="control-img-f" id="playBtn1" onclick="stopCircle()" src="./image4.png">
                </div>

                <div class="f-img-div">
                    <img class="control-img" src="./image3.png">
                </div>
            </div>
        </div>
    </div>
    <script>
        let audio = document.getElementById("song");
        let center_img = document.getElementById("center-img");
        let RoundImg = document.getElementById("f-img");
        let playBtn = document.getElementById("playBtn");

        let playBtn1 = document.getElementById("playBtn1");

        let progress = document.getElementById("progress");

        //chatGpt
        // Wait until metadata (like duration) is loaded
        audio.addEventListener("loadedmetadata", function () {
            progress.max = audio.duration;
        });

        // Update slider as song plays
        audio.addEventListener("timeupdate", function () {
            progress.value = audio.currentTime;
        });

        // Allow user to seek
        //chatGpt
        progress.addEventListener("input", function () {
            audio.currentTime = progress.value;
        });
        function rotateCircle() {
            audio.play();
            playBtn.style.display = "none"
            playBtn1.style.display = "block"
            RoundImg.style.animation = "spin 3s linear infinite"
            center_img.style.animation = "spin1 3s linear infinite"
        }
        function stopCircle() {
            audio.pause();
            RoundImg.style.animationPlayState = "paused"
            center_img.style.animationPlayState = "paused"
            playBtn.style.display = "block"
            playBtn1.style.display = "none"
        }
    </script>
</body>
</html>
